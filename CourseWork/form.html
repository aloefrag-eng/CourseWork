<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBraga — Создать пост</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" type="image/png" href="assets/logo-icon.png">
</head>
<body class="page-preload">
    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-left">
                <a href="index.html" class="brand">
                    <span class="brand-mark brand-mark-image">
                        <img src="assets/logo-icon.png" alt="Логотип InstaBraga" class="brand-logo">
                    </span>
                    <span class="brand-text">InstaBraga</span>
                </a>

                <div class="topbar-search">
                    <input type="text" placeholder="Форма публикации" readonly>
                </div>
            </div>

            <div class="topbar-user">
                <span class="user-dot"></span>
                <span>Гость</span>
            </div>
        </div>
    </header>

    <main class="app-layout app-layout-wide">
        <aside class="sidebar">
            <div class="panel menu-card">
                <div class="menu-title">Меню</div>

                <ul class="left-menu">
                    <li><a class="menu-link" href="index.html">Лента</a></li>
                    <li><a class="menu-link active" href="form.html">Создать пост</a></li>
                    <li><a class="menu-link" href="ads.html">Управление рекламой</a></li>
                    <li><a class="menu-link" href="about.html">О проекте</a></li>
                </ul>
            </div>
        </aside>

        <section class="content-column content-column-wide">
            <div class="panel form-card">
                <div class="page-head">
                    <h1 class="page-title">Добавление поста</h1>
                    <p class="page-subtitle">Заполните форму и сохраните публикацию в ленту.</p>
                </div>

                <form id="post-form" class="post-form">
                    <div class="field-group">
                        <label for="author">Автор</label>
                        <input
                            id="author"
                            name="author"
                            type="text"
                            class="form-control"
                            placeholder="Например: Иван Петров"
                        >
                    </div>

                    <div class="field-group">
                        <label for="content">Текст поста</label>
                        <textarea
                            id="content"
                            name="content"
                            class="form-control form-textarea"
                            placeholder="Введите текст публикации"
                        ></textarea>
                    </div>

                    <div class="field-group">
                        <label for="image">Ссылка на изображение</label>
                        <input
                            id="image"
                            name="image"
                            type="text"
                            class="form-control"
                            placeholder="https://example.com/image.jpg"
                        >
                    </div>

                    <div class="actions-row">
                        <button type="submit" class="primary-btn">Сохранить пост</button>
                        <a href="index.html" class="secondary-btn">Отмена</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/form.js"></script>
</body>
</html>
